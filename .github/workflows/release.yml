name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Prettier
        run: npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib --all-targets -- -D warnings

      - name: Test
        run: npm test

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Extract version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set commit hash
        run: echo "APP_COMMIT=$(git rev-parse --short=9 HEAD)" >> $GITHUB_ENV

      - name: Build frontend
        run: npm run build

  build-tauri:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          cd src-tauri && cargo generate-lockfile

      - name: Set build env vars
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "APP_COMMIT=$(git rev-parse --short=9 HEAD)" >> $GITHUB_ENV

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${{ vars.APPLE_API_KEY }}.p8
          echo "API_KEY_PATH=$HOME/private_keys/AuthKey_${{ vars.APPLE_API_KEY }}.p8" >> $GITHUB_ENV

      - name: Verify Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          DEVELOPER_ID_SIGNING_IDENTITY: ${{ vars.DEVELOPER_ID_SIGNING_IDENTITY }}
        run: |
          # Verify base64 is valid
          echo "$DEVELOPER_ID_CERTIFICATE" | base64 --decode > /tmp/dev_cert.p12 || {
            echo "::error::Failed to decode DEVELOPER_ID_CERTIFICATE. Ensure it's base64 encoded."
            exit 1
          }

          # Verify certificate password works, including legacy PKCS#12 exports from Keychain Access.
          openssl pkcs12 -legacy -in /tmp/dev_cert.p12 -passin pass:"$DEVELOPER_ID_CERTIFICATE_PASSWORD" -info -noout || {
            echo "::error::Failed to read DEVELOPER_ID_CERTIFICATE. Password may be incorrect, certificate may be corrupted, or the PKCS#12 file may use unsupported legacy encryption."
            exit 1
          }

          # Verify signing identity format
          echo "$DEVELOPER_ID_SIGNING_IDENTITY" | grep -q "Developer ID Application:" || {
            echo "::error::DEVELOPER_ID_SIGNING_IDENTITY must start with 'Developer ID Application:'"
            exit 1
          }

          echo "✅ Developer ID certificate verified successfully"
          rm /tmp/dev_cert.p12

      - name: Verify Apple Intelligence SDK support
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          cat <<'EOF' > /tmp/foundation-models-check.swift
          import Foundation
          import FoundationModels
          EOF
          xcrun swiftc -typecheck /tmp/foundation-models-check.swift

      - name: Build Tauri app (Developer ID signed + notarized)
        uses: tauri-apps/tauri-action@v0
        env:
          CLIPWISE_REQUIRE_APPLE_MODEL_RUNNER: "1"
          LLM_ACTIONS_VERSION: ${{ env.APP_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ vars.DEVELOPER_ID_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ vars.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          args: ${{ matrix.args }} --config src-tauri/tauri.macos.conf.json
