name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Prettier
        run: npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Test build
        run: npx vite build
