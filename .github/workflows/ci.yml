name: CI

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate release notes
        run: ./scripts/validate-release-notes.sh

      - name: Lint
        run: npx eslint .

      - name: Prettier
        run: npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib --all-targets -- -D warnings

      - name: Test coverage
        run: npm run test:coverage

      - name: Report test coverage
        if: always()
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "### Test coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage summary was not generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          const summary = require('./coverage/coverage-summary.json').total;
          const rows = [
            ['Lines', summary.lines.pct],
            ['Statements', summary.statements.pct],
            ['Functions', summary.functions.pct],
            ['Branches', summary.branches.pct],
          ];

          console.log('### Test coverage');
          console.log('| Metric | Coverage | Minimum |');
          console.log('| --- | ---: | ---: |');
          for (const [name, pct] of rows) {
            console.log(`| ${name} | ${pct}% | 95% |`);
          }
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Test build
        run: npx vite build

  release:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    secrets: inherit
