pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx}"
      run: $SHELL -lic 'npx eslint {staged_files}'
    prettier:
      glob: "*.{ts,tsx,json,css,md,html,yml,yaml}"
      run: $SHELL -lic 'npx prettier --check {staged_files}'
    typecheck:
      run: $SHELL -lic 'npx tsc --noEmit'
